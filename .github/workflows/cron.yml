name: Scheduled collection

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger collection and detection
        run: |
          curl -sf -X POST "${{ secrets.DASHBOARD_URL }}/api/cron" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
