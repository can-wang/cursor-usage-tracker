app = "cursor-usage-tracker-demo"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile.demo"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DATABASE_PATH = "/app/data/tracker.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
